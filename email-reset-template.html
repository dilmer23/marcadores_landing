<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
</head>
<body style="margin:0;padding:0;background-color:#f5f7fa;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#f5f7fa;padding:40px 16px;">
    <tr>
      <td align="center">
        <table role="presentation" width="480" cellpadding="0" cellspacing="0" style="background-color:#ffffff;border-radius:16px;padding:40px 32px;box-shadow:0 4px 24px rgba(0,0,0,0.08);max-width:100%;">
          <tr>
            <td align="center" style="padding-bottom:8px;">
              <span style="font-size:40px;">🔐</span>
            </td>
          </tr>
          <tr>
            <td align="center" style="padding-bottom:8px;">
              <h1 style="margin:0;font-size:22px;font-weight:700;color:#1a1a2e;">Restablecer contraseña</h1>
            </td>
          </tr>
          <tr>
            <td align="center" style="padding-bottom:24px;">
              <p style="margin:0;font-size:15px;color:#6b7280;line-height:1.5;">
                Recibimos una solicitud para restablecer tu contraseña.
                Hacé clic en el botón para elegir una nueva.
              </p>
            </td>
          </tr>
          <tr>
            <td align="center" style="padding-bottom:24px;">
              <a href="{{ .SiteURL }}/auth/reset-password" style="display:inline-block;padding:14px 32px;background-color:#6366f1;color:#ffffff;text-decoration:none;border-radius:10px;font-size:16px;font-weight:600;">
                Restablecer contraseña
              </a>
            </td>
          </tr>
          <tr>
            <td align="center">
              <p style="margin:0;font-size:13px;color:#9ca3af;line-height:1.5;">
                Si no solicitaste esto, podés ignorar este correo.<br />
                El enlace expira en 24 horas.
              </p>
            </td>
          </tr>
          <tr>
            <td align="center" style="padding-top:24px;border-top:1px solid #e5e7eb;margin-top:24px;">
              <p style="margin:0;font-size:12px;color:#9ca3af;">
                Recibís este email porque tenés una cuenta en MarcadoresLanding.
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
